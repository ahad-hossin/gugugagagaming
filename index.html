<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#05060e" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2305060e'/%3E%3Ctext x='16' y='23' font-size='18' text-anchor='middle' fill='%233df5ff'%3E%F0%9F%8E%AE%3C/text%3E%3C/svg%3E" />
  <title>gugugagagaming — game hub</title>
  <meta name="description" content="A little arcade of browser games. Pick one and play." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Space+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box}
    :root{
      --bg:#05060e; --bg2:#0a1326; --glow:#3df5ff; --glow2:#ff3dee;
      --card:rgba(14,27,51,.55); --border:#2e5c8a; --text:#d6f4ff; --dim:#6e8fb0;
      --disp:'Orbitron','Eurostile',sans-serif; --mono:'Space Mono',ui-monospace,monospace; --body:'Inter',system-ui,sans-serif;
    }
    html,body{margin:0;min-height:100dvh}
    body{
      font-family:var(--body); color:var(--text); overflow-x:hidden;
      background:radial-gradient(120% 120% at 50% 0%, var(--bg2), var(--bg) 70%) fixed;
      -webkit-font-smoothing:antialiased;
    }
    #stars{position:fixed;inset:0;z-index:0;pointer-events:none}
    .wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:clamp(2rem,6vh,5rem) clamp(1rem,4vw,2rem) 4rem}
    header.hub{text-align:center;margin-bottom:clamp(2rem,5vh,3.5rem)}
    .logo{font-family:var(--disp);font-weight:800;letter-spacing:.04em;font-size:clamp(2rem,8vw,4rem);margin:0;
      background:linear-gradient(90deg,var(--glow),var(--glow2));-webkit-background-clip:text;background-clip:text;color:transparent;
      text-shadow:0 0 40px rgba(61,245,255,.25)}
    .tag{font-family:var(--mono);color:var(--dim);letter-spacing:.05em;margin:.6rem 0 0;font-size:clamp(.75rem,2.5vw,.95rem)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,260px),1fr));gap:1.2rem}
    .card{
      position:relative;display:flex;flex-direction:column;gap:.6rem;text-decoration:none;color:var(--text);
      background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.4rem;min-height:190px;
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);overflow:hidden;
      transition:transform .18s cubic-bezier(.16,1,.3,1),border-color .2s,box-shadow .25s;
    }
    .card .art{font-size:2.6rem;line-height:1;filter:drop-shadow(0 0 14px var(--accent,var(--glow)))}
    .card h2{font-family:var(--disp);font-size:1.15rem;letter-spacing:.06em;margin:.2rem 0 0}
    .card p{font-family:var(--mono);font-size:.74rem;color:var(--dim);margin:0;line-height:1.5}
    .card .go{margin-top:auto;font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent,var(--glow))}
    .card.live{--accent:var(--glow)}
    .card.live:hover{transform:translateY(-6px);border-color:var(--accent);box-shadow:0 18px 50px rgba(0,0,0,.5),0 0 30px rgba(61,245,255,.22)}
    .card.live::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 0%,rgba(61,245,255,.12),transparent 60%);opacity:0;transition:opacity .25s}
    .card.live:hover::before{opacity:1}
    .card.soon{opacity:.55;cursor:not-allowed;border-style:dashed}
    .badge{position:absolute;top:1rem;right:1rem;font-family:var(--mono);font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;
      padding:.2rem .5rem;border-radius:999px;border:1px solid currentColor}
    .badge.on{color:var(--glow)} .badge.off{color:var(--dim)}
    footer.hub{text-align:center;margin-top:3rem;font-family:var(--mono);font-size:.7rem;color:var(--dim)}
    footer.hub a{color:var(--glow);text-decoration:none}
    @media (prefers-reduced-motion:reduce){.card{transition:none}}
    :focus-visible{outline:2px solid var(--glow);outline-offset:3px;border-radius:6px}
  </style>
</head>
<body>
  <canvas id="stars" aria-hidden="true"></canvas>
  <div class="wrap">
    <header class="hub">
      <h1 class="logo">gugugagagaming</h1>
      <p class="tag">a little arcade of browser games · pick one and play</p>
    </header>

    <main class="grid" id="grid"></main>

    <footer class="hub">
      built with vanilla HTML/CSS/JS · no engines, no installs · <a href="/battleship">jump to Battleship →</a>
    </footer>
  </div>

  <script>
    // game registry — add a new game by dropping a folder + an entry here
    var GAMES = [
      { slug:'battleship', title:'SONAR', art:'⚓', live:true,
        desc:'Audio-first Battleship. 4 themes, shaped fleets, abilities, online multiplayer.' },
      { slug:'monopoly', title:'TYCOON', art:'🎩', live:true,
        desc:'Online property-trading tycoon for up to 16 players. Trade, auction, build — bankrupt your friends.' },
      { slug:null, title:'Coming soon', art:'👾', live:false, desc:'More to come under gugugagagaming.' }
    ];
    var grid = document.getElementById('grid');
    GAMES.forEach(function (g) {
      var el = document.createElement(g.live ? 'a' : 'div');
      el.className = 'card ' + (g.live ? 'live' : 'soon');
      if (g.live) el.href = '/' + g.slug;
      el.innerHTML =
        '<span class="badge ' + (g.live ? 'on' : 'off') + '">' + (g.live ? 'play' : 'soon') + '</span>' +
        '<div class="art">' + g.art + '</div>' +
        '<h2>' + g.title + '</h2>' +
        '<p>' + g.desc + '</p>' +
        '<span class="go">' + (g.live ? 'Enter →' : 'In the works') + '</span>';
      grid.appendChild(el);
    });

    // lightweight starfield
    (function () {
      var c = document.getElementById('stars'), x = c.getContext('2d'), W, H, dpr = Math.min(devicePixelRatio || 1, 2), stars = [];
      function resize(){ W = innerWidth; H = innerHeight; c.width = W*dpr; c.height = H*dpr; c.style.width=W+'px'; c.style.height=H+'px'; x.setTransform(dpr,0,0,dpr,0,0);
        stars = []; var n = Math.min(160, Math.floor(W*H/12000));
        for (var i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.2,vx:-(Math.random()*.18+.02),tw:Math.random()*6.28,h:Math.random()<.2?'255,61,238':'124,252,255'}); }
      var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
      function loop(){ x.clearRect(0,0,W,H);
        for (var i=0;i<stars.length;i++){ var s=stars[i]; if(!reduce){ s.x+=s.vx; s.tw+=.03; if(s.x<0){s.x=W;s.y=Math.random()*H;} }
          x.fillStyle='rgba('+s.h+','+(.4+.5*Math.sin(s.tw))+')'; x.beginPath(); x.arc(s.x,s.y,s.r,0,6.2832); x.fill(); }
        requestAnimationFrame(loop); }
      addEventListener('resize', resize); resize(); loop();
    })();
  </script>
</body>
</html>
